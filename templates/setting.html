<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Blood Connect</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: url('{{ url_for('static', filename='images/1.jpg') }}') no-repeat center center/cover;
            background-attachment: fixed;
            color: #000;
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7));
            z-index: -1;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            z-index: 1001;
        }
        .header .logo {
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }
        .menu-icon {
            font-size: 24px;
            cursor: pointer;
            color: #fff;
        }
        .sidebar {
            width: 250px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px;
            position: fixed;
            height: 100%;
            top: 60px;
            left: -250px;
            transition: left 0.3s ease;
            z-index: 1000;
        }
        .sidebar.active {
            left: 0;
        }
        .sidebar ul {
            list-style: none;
            width: 100%;
        }
        .sidebar ul li {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        .sidebar ul li a {
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            display: block;
        }
        .sidebar ul li:hover, .sidebar ul li.active {
            background: #d40000;
        }
        .page-header {
            text-align: center;
            margin-top: 80px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(50px);
            border-radius: 10px;
            margin-bottom: 20px;
            color: #000;
            transition: margin-left 0.3s ease;
        }
        .page-header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            color: #d40000;
            font-weight: bold;
        }
        .page-header p {
            font-size: 18px;
            color: #0a0a0a;
            font-weight: bold;
        }
        .main-content {
            margin-top: 20px;
            padding: 20px;
            position: relative;
            z-index: 2;
            transition: margin-left 0.3s ease;
        }
        .sidebar.active ~ .main-content, .sidebar.active ~ .page-header {
            margin-left: 250px;
        }
        .settings-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .box {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(50px);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        .box h2 {
            color: #d40000;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .box p {
            margin: 10px 0;
            font-size: 16px;
            color: #000;
        }
        .box p strong {
            color: #d40000;
        }
        .box input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 2px solid #0c0a0a;
            border-radius: 5px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.5);
            color: #000;
            backdrop-filter: blur(10px);
        }
        .box button {
            width: 100%;
            padding: 10px;
            background: #d40000;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s ease;
        }
        .box button:hover {
            background: #b30000;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1002;
        }
        .modal-content {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            color: #000;
        }
        .modal-content h2 {
            margin-bottom: 20px;
            color: #d40000;
        }
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 2px solid #0c0a0a;
            border-radius: 5px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.5);
            color: #000;
            backdrop-filter: blur(10px);
        }
        .modal-content button {
            padding: 10px 20px;
            background: #d40000;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 20px;
        }
        .modal-content button:hover {
            background: #b30000;
        }
    </style>
    <script>
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('active');
        }
        function verifyPasswordForEdit() {
            document.getElementById('editProfileModal').style.display = 'flex';
        }
        function saveProfile() {
            document.getElementById('editProfileForm').submit();
        }
    </script>
</head>
<body>
    <div class="header">
        <div class="logo">🩸🔗 Blood Connect</div>
        <div class="icons">
            <span class="menu-icon" onclick="toggleSidebar()">☰</span>
        </div>
    </div>
    <div class="sidebar">
        <ul>
            <li><a href="{{ url_for('user_dashboard') }}">Dashboard</a></li>
            <li><a href="{{ url_for('find_donor') }}">Find a Donor</a></li>
            <li><a href="{{ url_for('request_blood') }}">Request Blood</a></li>
            <li class="active"><a href="{{ url_for('settings') }}">Settings</a></li>
            <li><a href="{{ url_for('logout') }}">Logout</a></li>
        </ul>
    </div>
    <div class="page-header">
        <h1>Settings</h1>
        <p>Manage your account and preferences.</p>
    </div>
    <div class="main-content">
        <div class="settings-container">
            <div class="box">
                <h2>Profile Information</h2>
                <p><strong>Name:</strong> <input type="text" id="userName" value="{{ user.name }}" disabled></p>
                <p><strong>Email:</strong> <input type="text" id="userEmail" value="{{ user.email }}" disabled></p>
                <p><strong>Blood Group:</strong> <input type="text" id="userBloodGroup" value="{{ user.blood_group }}" disabled></p>
                <p><strong>Location:</strong> <input type="text" id="userLocation" value="{{ user.address }}" disabled></p>
                <p><strong>Contact No:</strong> <input type="text" id="userContactNo" value="{{ user.phone }}" disabled></p>
                <button onclick="verifyPasswordForEdit()">Edit Profile</button>
            </div>
        </div>
    </div>
    <div class="modal" id="editProfileModal">
        <div class="modal-content">
            <h2>Edit Profile</h2>
            <form id="editProfileForm" method="POST" action="{{ url_for('settings') }}">
                <input type="text" id="editName" name="editName" placeholder="Name" value="{{ user.name }}">
                <input type="text" id="editLocation" name="editLocation" placeholder="Location" value="{{ user.address }}">
                <input type="text" id="editContactNo" name="editContactNo" placeholder="Contact No" value="{{ user.phone }}">
                <button type="button" onclick="saveProfile()">Save Changes</button>
                <button type="button" onclick="document.getElementById('editProfileModal').style.display = 'none'">Cancel</button>
            </form>
        </div>
    </div>
</body>
</html>
