<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find a Donor - Blood Connect</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: url('{{ url_for('static', filename='images/001.jpg') }}') no-repeat center center/cover;
            background-attachment: fixed;
            color: #000;
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7));
            z-index: -1;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            z-index: 1001;
        }
        .header .logo {
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }
        .menu-icon {
            font-size: 24px;
            cursor: pointer;
            color: #fff;
        }
        .sidebar {
            width: 250px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px;
            position: fixed;
            height: 100%;
            top: 60px;
            left: -250px;
            transition: left 0.3s ease;
            z-index: 1000;
        }
        .sidebar.active {
            left: 0;
        }
        .sidebar ul {
            list-style: none;
            width: 100%;
        }
        .sidebar ul li {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        .sidebar ul li a {
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            display: block;
        }
        .sidebar ul li:hover, .sidebar ul li.active {
            background: #d40000;
        }
        .page-header {
            text-align: center;
            margin-top: 80px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(50px);
            border-radius: 10px;
            margin-bottom: 20px;
            color: #000;
            transition: margin-left 0.3s ease;
        }
        .page-header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            color: #d40000;
            font-weight: bold;
        }
        .page-header p {
            font-size: 18px;
            color: #0a0a0a;
            font-weight: bold;
        }
        .main-content {
            margin-top: 20px;
            padding: 20px;
            position: relative;
            z-index: 2;
            transition: margin-left 0.3s ease;
        }
        .sidebar.active ~ .main-content, .sidebar.active ~ .page-header {
            margin-left: 250px;
        }
        .search-bar {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(50px);
            padding: 20px;
            border-radius: 10px;
        }
        .search-bar input,
        .search-bar select {
            padding: 14px;
            width: 32%;
            border-radius: 10px;
            border: 2px solid #d40000;
            font-size: 20px;
            font-weight: bold;
            color: #000;
            background: rgba(255, 255, 255, 0.8);
            cursor: pointer;
        }
        .search-bar input::placeholder {
            color: #666;
        }
        .donor-list {
            margin-top: 30px;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .donor-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(50px);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            color: #000;
            font-weight: bold;
            transition: transform 0.2s;
            cursor: pointer;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }
        .donor-card:hover {
            transform: scale(1.05);
        }
        .donor-card h3 {
            color: #d40000;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1002;
        }
        .modal-content {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            color: #000;
        }
        .modal-content h2 {
            margin-bottom: 20px;
            color: #d40000;
        }
        .modal-content p {
            margin: 10px 0;
        }
        .modal-content button {
            padding: 10px 20px;
            background: #d40000;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 20px;
        }
        .modal-content button:hover {
            background: #b30000;
        }
    </style>
    <script>
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('active');
        }
        function openDonorModal(name, bloodGroup, location) {
            const modal = document.getElementById("donorModal");
            const modalContent = document.getElementById("donorModalContent");
            modalContent.innerHTML = `
                <h2>${name}</h2>
                <p><strong>Blood Group:</strong> ${bloodGroup}</p>
                <p><strong>Location:</strong> ${location}</p>
                <button onclick="closeDonorModal()">Close</button>
            `;
            modal.style.display = "flex";
        }
        function closeDonorModal() {
            document.getElementById("donorModal").style.display = "none";
        }
        function filterDonors() {
            const searchName = document.getElementById("searchName").value.toLowerCase();
            const searchBlood = document.getElementById("searchBlood").value;
            const searchLocation = document.getElementById("searchLocation").value.toLowerCase();

            const donorCards = document.querySelectorAll(".donor-card");
            donorCards.forEach(card => {
                const name = card.querySelector("h3").textContent.toLowerCase();
                const bloodGroup = card.querySelector("p:nth-of-type(1)").textContent.split(": ")[1];
                const location = card.querySelector("p:nth-of-type(2)").textContent.split(": ")[1].toLowerCase();

                const nameMatch = name.includes(searchName);
                const bloodMatch = searchBlood === "" || bloodGroup === searchBlood;
                const locationMatch = searchLocation === "" || location.includes(searchLocation);

                if (nameMatch && bloodMatch && locationMatch) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        }
    </script>
</head>
<body>
    <div class="header">
        <div class="logo">🩸🔗 Blood Connect</div>
        <div class="icons">
            <span class="menu-icon" onclick="toggleSidebar()">☰</span>
        </div>
    </div>
    <div class="sidebar">
        <ul>
            <li><a href="{{ url_for('user_dashboard') }}">Dashboard</a></li>
            <li class="active"><a href="{{ url_for('find_donor') }}">Find a Donor</a></li>
            <li><a href="{{ url_for('request_blood') }}">Request Blood</a></li>
            <li><a href="{{ url_for('settings') }}">Settings</a></li>
            <li><a href="{{ url_for('logout') }}">Logout</a></li>
        </ul>
    </div>
    <div class="page-header">
        <h1>Find a Donor</h1>
        <p>Search for available blood donors.</p>
    </div>
    <div class="main-content">
        <div class="search-bar">
            <input type="text" id="searchName" placeholder="Search by name..." oninput="filterDonors()">
            <select id="searchBlood" onchange="filterDonors()">
                <option value="">Select Blood Type</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
            </select>
            <input type="text" id="searchLocation" placeholder="Search by location..." oninput="filterDonors()">
        </div>
        <div class="donor-list" id="donorList">
            {% for donor in donors %}
                <div class="donor-card" onclick="openDonorModal('{{ donor.name }}', '{{ donor.blood_group }}', '{{ donor.address }}')">
                    <h3>{{ donor.name }}</h3>
                    <p>Blood Group: {{ donor.blood_group }}</p>
                    <p>Location: {{ donor.address }}</p>
                </div>
            {% endfor %}
        </div>
    </div>
    <div class="modal" id="donorModal">
        <div class="modal-content" id="donorModalContent"></div>
    </div>
</body>
</html>
